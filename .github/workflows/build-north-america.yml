name: Build Maps - North America

on:
  schedule:
    - cron: '0 2 6 * *'
  workflow_dispatch:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          echo "matrix=$(cat config/regions/regions-north-america.json | python3 -c "
          import json,sys
          regions = json.load(sys.stdin)
          print(json.dumps({'region': regions}))
          ")" >> $GITHUB_OUTPUT


  build-maps:
    needs: generate-matrix
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y osmium-tool default-jre wget

      - name: Setup Osmosis and mapsforge
        run: |
          wget -q https://github.com/openstreetmap/osmosis/releases/download/0.49.2/osmosis-0.49.2.zip
          unzip -q osmosis-0.49.2.zip -d osmosis_install
          chmod +x osmosis_install/osmosis-0.49.2/bin/osmosis
          echo "OSMOSIS_HOME=$(pwd)/osmosis_install/osmosis-0.49.2" >> $GITHUB_ENV

          mkdir -p $HOME/.openstreetmap/osmosis/plugins
          wget -q "https://repo1.maven.org/maven2/org/mapsforge/mapsforge-map-writer/0.21.0/mapsforge-map-writer-0.21.0-jar-with-dependencies.jar" \
            -O $HOME/.openstreetmap/osmosis/plugins/mapsforge-map-writer.jar

          echo "JAVACMD_OPTIONS=-Xmx7500m" >> $GITHUB_ENV

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view maps-north-america &>/dev/null || gh release create maps-north-america \
            --title "Maps - North America" \
            --notes "Auto-generated .map files for WristNav. Updated monthly." \
            --latest=false

      - name: Download, filter and convert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RID="${{ matrix.region.id }}"
          FNAME="${RID//\//-}.map"

          PBF="/tmp/region.osm.pbf"
          FILTERED="/tmp/region_filtered.osm.pbf"
          OUT="output/$FNAME"

          mkdir -p output

          echo "=== ${{ matrix.region.name }} ==="

          wget -q --timeout=300 --tries=2 -O "$PBF" "${{ matrix.region.pbf }}"

          osmium tags-filter "$PBF" \
            w/highway w/path w/footway w/bridleway \
            w/track w/waterway w/natural w/landuse w/railway \
            n/railway \
            -o "$FILTERED" --overwrite

          SIZE_MB=$(du -m "$FILTERED" | cut -f1)

          echo "Filtered size: ${SIZE_MB}MB"

          CMD="$OSMOSIS_HOME/bin/osmosis --rb file=$FILTERED --mw file=$OUT type=hd"

          if [ "$SIZE_MB" -gt 80 ]; then
            CMD="$CMD type=hd"
            echo "Using HD mode"
          fi

          $CMD

          ls -lh "$OUT"

          gh release upload maps-north-america "$OUT" --clobber

          echo "Uploaded $FNAME"


  generate-index:
    needs: build-maps
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate and upload index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, os
          from datetime import datetime

          with open("config/regions/regions-north-america.json") as f:
              regions = json.load(f)

          result = subprocess.run([
              "gh", "release", "view", "maps-north-america",
              "--json", "assets", "--jq", "[.assets[].name]"
          ], capture_output=True, text=True,
          env={**os.environ, "GH_TOKEN": os.environ.get("GH_TOKEN","")})

          uploaded = json.loads(result.stdout or "[]")

          base_url = "https://github.com/${{ github.repository }}/releases/download/maps-north-america"

          index = {
              "updated": datetime.now().strftime("%Y-%m-%d"),
              "regions": []
          }

          for region in regions:
              fname = region["id"].replace("/", "-") + ".map"

              if fname in uploaded:
                  index["regions"].append({
                      "id": region["id"],
                      "name": region["name"],
                      "path": region["path"],
                      "url": f"{base_url}/{fname}",
                  })

          os.makedirs("output", exist_ok=True)

          with open("output/index.json", "w") as f:
              json.dump(index, f, indent=2)

          print(f"index.json: {len(index['regions'])} regions")
          EOF

          gh release upload maps-north-america output/index.json --clobber
