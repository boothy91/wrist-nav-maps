name: Build Maps - North America

on:
  schedule:
    - cron: '0 2 6 * *'
  workflow_dispatch:

jobs:
  build-maps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y osmium-tool default-jre wget

      - name: Setup Osmosis and mapsforge
        run: |
          wget -q https://github.com/openstreetmap/osmosis/releases/download/0.49.2/osmosis-0.49.2.zip
          unzip -q osmosis-0.49.2.zip -d osmosis_install
          chmod +x osmosis_install/osmosis-0.49.2/bin/osmosis
          OSMOSIS_HOME=$(pwd)/osmosis_install/osmosis-0.49.2
          echo "OSMOSIS_HOME=$OSMOSIS_HOME" >> $GITHUB_ENV
          mkdir -p $HOME/.openstreetmap/osmosis/plugins
          wget -q "https://repo1.maven.org/maven2/org/mapsforge/mapsforge-map-writer/0.21.0/mapsforge-map-writer-0.21.0-jar-with-dependencies.jar" \
            -O $HOME/.openstreetmap/osmosis/plugins/mapsforge-map-writer.jar
          echo "JAVACMD_OPTIONS=-Xmx3g" >> $GITHUB_ENV

      - name: Create empty release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete maps-north-america --yes 2>/dev/null || true
          git push --delete origin maps-north-america 2>/dev/null || true
          gh release create maps-north-america \
            --title "Maps - North America - $(date +'%B %Y')" \
            --notes "Auto-generated .map files for WristNav. Updated monthly." \
            --latest=false

      - name: Convert regions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          python3 - << 'PYEOF2'
          import json, os, subprocess, sys

          with open("config/regions/regions-north-america.json") as f:
              regions = json.load(f)

          osmosis = os.path.join(os.environ["OSMOSIS_HOME"], "bin", "osmosis")
          failed = []

          for region in regions:
              rid      = region["id"]
              rname    = region["name"]
              pbf_url  = region["pbf"]
              pbf      = f"/tmp/{rid}.osm.pbf"
              filtered = f"/tmp/{rid}_filtered.osm.pbf"
              out_map  = f"output/{rid}.map"

              print(f"\n=== {rname} ===")

              r = subprocess.run(["wget", "-q", "-O", pbf, pbf_url])
              if r.returncode != 0:
                  print(f"FAILED download {rid}"); failed.append(rid); continue

              r = subprocess.run([
                  "osmium", "tags-filter", pbf,
                  "w/highway", "w/path", "w/footway", "w/bridleway",
                  "w/track", "w/waterway", "w/natural", "w/landuse",
                  "-o", filtered, "--overwrite"
              ])
              if r.returncode != 0:
                  print(f"FAILED filter {rid}"); failed.append(rid); continue

              r = subprocess.run([
                  osmosis, "--rb", f"file={filtered}", "--mw", f"file={out_map}"
              ], capture_output=True, text=True,
              env={**os.environ, "JAVACMD_OPTIONS": "-Xmx3g"})

              if r.returncode != 0 or not os.path.exists(out_map):
                  print(f"FAILED convert {rid}: {r.stderr[-200:]}")
                  failed.append(rid)
              else:
                  size = os.path.getsize(out_map) / 1024 / 1024
                  print(f"Done: {out_map} ({size:.1f} MB)")
                  upload = subprocess.run([
                      "gh", "release", "upload", "maps-north-america", out_map, "--clobber"
                  ], capture_output=True, text=True,
                  env={**os.environ, "GH_TOKEN": os.environ.get("GH_TOKEN","")})
                  print(f"Uploaded {rid}.map" if upload.returncode == 0 else f"Upload failed: {upload.stderr}")

              for fp in [pbf, filtered]:
                  if os.path.exists(fp): os.remove(fp)

          if failed:
              print(f"\nFAILED: {failed}"); sys.exit(1)
          PYEOF2

      - name: Generate index
        run: |
          python3 - << 'PYEOF2'
          import json, os
          from datetime import datetime

          with open("config/regions/regions-north-america.json") as f:
              regions = json.load(f)

          base_url = "https://github.com/${{ github.repository }}/releases/download/maps-north-america"
          index = {"updated": datetime.now().strftime("%Y-%m-%d"), "regions": []}

          for region in regions:
              map_file = f"output/{region['id']}.map"
              if os.path.exists(map_file):
                  index["regions"].append({
                      "id": region["id"],
                      "name": region["name"],
                      "path": region["path"],
                      "url": f"{base_url}/{region['id']}.map",
                      "size": os.path.getsize(map_file)
                  })

          with open("output/index.json", "w") as f:
              json.dump(index, f, indent=2)
          print(f"index.json: {len(index['regions'])} regions")
          PYEOF2

      - name: Upload index.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload maps-north-america output/index.json --clobber
