name: Build Missing Maps

on:
  workflow_dispatch:

jobs:
  check-missing:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find-missing.outputs.matrix }}
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Find missing maps
        id: find-missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOADED=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName --jq '.[].tagName' | while read tag; do
            gh release view "$tag" --repo ${{ github.repository }} --json assets --jq '.assets[].name' 2>/dev/null
          done | grep '\.map$' | sort)

          MISSING=$(python3 -c "
          import json, glob, sys

          uploaded = set('''$UPLOADED'''.strip().split('\n'))

          regions = []
          for f in sorted(glob.glob('config/regions/regions-*.json')):
              tag = f.replace('config/regions/regions-', 'maps-').replace('.json', '')
              tag_map = {
                  'maps-africa': 'maps-africa',
                  'maps-asia': 'maps-asia',
                  'maps-australia-oceania': 'maps-others',
                  'maps-central-america': 'maps-others',
                  'maps-europe': 'maps-europe',
                  'maps-europe-uk': 'maps-europe-uk',
                  'maps-north-america': 'maps-north-america',
                  'maps-south-america': 'maps-others',
                  'maps-others': 'maps-others',
              }
              release = tag_map.get(tag, 'maps-others')
              with open(f) as fh:
                  data = json.load(fh)
              for r in data:
                  fname = r['id'].replace('/', '-') + '.map'
                  if fname not in uploaded:
                      regions.append({
                          'id': r['id'],
                          'name': r['name'],
                          'pbf': r['pbf'],
                          'release': release,
                          'fname': fname
                      })

          print(json.dumps({'region': regions}))
          ")

          echo "matrix=$MISSING" >> $GITHUB_OUTPUT
          echo "Missing regions: $(echo $MISSING | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['region']))")"

  build-missing:
    needs: check-missing
    runs-on: ubuntu-latest
    if: ${{ needs.check-missing.outputs.matrix != '{"region":[]}' }}

    permissions:
      contents: write

    strategy:
      matrix: ${{ fromJson(needs.check-missing.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y osmium-tool default-jre wget

      - name: Setup Osmosis and mapsforge
        run: |
          wget -q https://github.com/openstreetmap/osmosis/releases/download/0.49.2/osmosis-0.49.2.zip
          unzip -q osmosis-0.49.2.zip -d osmosis_install
          chmod +x osmosis_install/osmosis-0.49.2/bin/osmosis
          echo "OSMOSIS_HOME=$(pwd)/osmosis_install/osmosis-0.49.2" >> $GITHUB_ENV
          mkdir -p $HOME/.openstreetmap/osmosis/plugins
          wget -q "https://repo1.maven.org/maven2/org/mapsforge/mapsforge-map-writer/0.21.0/mapsforge-map-writer-0.21.0-jar-with-dependencies.jar" \
            -O $HOME/.openstreetmap/osmosis/plugins/mapsforge-map-writer.jar
          echo "JAVACMD_OPTIONS=-Xmx12000m" >> $GITHUB_ENV

      - name: Disk and memory check
        run: |
          echo "=== DISK ==="
          df -h
          echo "=== MEMORY ==="
          free -h
          echo "--- Creating 8GB swap file ---"
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== MEMORY AFTER SWAP ==="
          free -h

      - name: Download, filter and convert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PBF="/tmp/region.osm.pbf"
          FILTERED="/tmp/region_filtered.osm.pbf"
          FNAME="${{ matrix.region.fname }}"
          mkdir -p output

          echo "=== ${{ matrix.region.name }} ==="

          echo "--- Downloading PBF ---"
          wget --progress=dot:giga --timeout=600 --tries=2 -O "$PBF" "${{ matrix.region.pbf }}"
          echo "Download complete. Size:"
          ls -lh "$PBF"
          df -h /tmp

          echo "--- Running osmium filter ---"
          osmium tags-filter "$PBF" \
            w/highway w/path w/footway w/bridleway \
            w/track w/waterway w/natural w/landuse \
            -o "$FILTERED" --overwrite
          echo "Filter complete. Size:"
          ls -lh "$FILTERED"

          # If filtered file is over 600MB, do a second stricter pass to reduce heap load
          FILTERED_SIZE=$(stat -c%s "$FILTERED")
          if [ "$FILTERED_SIZE" -gt 629145600 ]; then
            echo "--- Large region ($(ls -lh $FILTERED | awk '{print $5}')), applying stricter filter ---"
            SIMPLIFIED="/tmp/region_simplified.osm.pbf"
            osmium tags-filter "$FILTERED" \
              w/highway=motorway w/highway=trunk w/highway=primary \
              w/highway=secondary w/highway=tertiary w/highway=unclassified \
              w/highway=residential w/highway=track w/highway=path \
              w/highway=footway w/highway=cycleway w/highway=steps \
              w/waterway=river w/waterway=stream \
              w/natural=coastline w/natural=water \
              w/landuse=forest w/landuse=residential \
              -o "$SIMPLIFIED" --overwrite
            echo "Simplified size:"
            ls -lh "$SIMPLIFIED"
            FILTERED="$SIMPLIFIED"
          fi

          df -h /tmp
          echo "--- Running osmosis/mapsforge ---"
          $OSMOSIS_HOME/bin/osmosis --rb file="$FILTERED" --mw file="output/$FNAME" type=hd
          echo "Conversion complete. Size:"
          ls -lh "output/$FNAME"

          echo "--- Uploading to release ---"
          gh release upload "${{ matrix.region.release }}" "output/$FNAME" --clobber
          echo "Uploaded $FNAME to ${{ matrix.region.release }}"
